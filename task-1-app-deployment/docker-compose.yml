
version: '3'

services:

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - node
      - apache

  mongo:
    image: mongo
    restart: always
    ports:
      - "27017:27017"

  node:
    image: node:18
    working_dir: /app
    volumes:
      - ./node:/app
    command: "node server.js"
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  mysql:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: legacydb
    ports:
      - "3306:3306"

  apache:
    image: php:7.4-apache
    volumes:
      - ./php:/var/www/html
    ports:
      - "8080:80"
    depends_on:
      - mysql
